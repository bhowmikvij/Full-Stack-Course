<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--  GROUP TOGETHER HTML -->
    <!--  <span> inline container to group element for styling purposes -->
    <!--  <div> block container to group element for styling purposes -->
    <h1><span style="background-color: brown;">This is the span title</span></h1>
    <h1><div style="background-color: blue;">This is the div title</div></h1>

    <p><span style="background-color: aquamarine;">This is span sentence</span></p>
    <p><div style="background-color: aqua;">This is div sentence</div></p>

</body>
</html>
