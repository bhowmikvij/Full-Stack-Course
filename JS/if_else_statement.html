    const mytext = document.getElementById("mytext")
    const mysubmit = document.getElementById("mysubmit")
    const resultElement = document.getElementById("resultElement")

    let marks;
    
    mysubmit.onclick = function(){

        marks = mytext.value;
        marks = Number(marks);

        if (marks >= 85) {
            resultElement.textContent = `A GRADE`
        }
        else if (marks >= 70) {
            resultElement.textContent = `B GRADE`
        }
        else if (marks >= 55) {
            resultElement.textContent = `C GRADE`
        } 
        else if (marks >= 40) {
            resultElement.textContent = `D GRADE`
        }
        else {
            resultElement.textContent = `FAIL`
        }
