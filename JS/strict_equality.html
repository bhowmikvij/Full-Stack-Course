<script>
    // = assignment operator
    // == comparison operator (compare if values are equal)

    const PI = 3.14;

    if (PI == "3.14") {
        console.log("This is PI");
    }
    else{
        console.log("This is not PI");
    }

    // === strict equality operator (compare if value and datatype are equal)
    
    const PI = 3.14;

    if (PI === "3.14") {
        console.log("This is PI");
    }
    else{
        console.log("This is not PI");
    }

    // != inequality operator
    
    const PI = 3.14;

    if (PI != "3.14") {
        console.log("This is not PI");
    }
    else{
        console.log("This is PI");
    }
    // !== strict inequality operator

    const PI = 3.14;

    if (PI !== "3.14") {
        console.log("This is not PI");
    }
    else{
        console.log("This is PI");
    }


</script>
