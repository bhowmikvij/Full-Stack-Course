<script>
    // string slicing = creating a substring from 
    //                  a portion of another string
    //                  string.slice(start, end)

    const fullName = "Bhowmik Vij";
    // let firstName = fullName.slice(0, 7); // Bhowmik
    // let lastName = fullName.slice(8, 11); // Vij

    let firstName = fullName.slice(0, fullName.indexOf(" ")) // Bhowmik // space isiliye diya ha ki space tak print hona chahiye 
    let lastName = fullName.slice(fullName.indexOf(" ")) // Vij
    
    console.log(firstName);
    console.log(lastName);

</script>
